name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: linux-x86_64
            bin_name: cube
            archive_name: cube-${{ github.ref_name }}-linux-x86_64.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            label: macos-x86_64
            bin_name: cube
            archive_name: cube-${{ github.ref_name }}-macos-x86_64.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-aarch64
            bin_name: cube
            archive_name: cube-${{ github.ref_name }}-macos-aarch64.tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target "${{ matrix.target }}" --bin "${{ matrix.bin_name }}"

      - name: Package artifact
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.bin_name }}" "dist/${{ matrix.bin_name }}"
          chmod +x "dist/${{ matrix.bin_name }}"
          tar -czf "${{ matrix.archive_name }}" -C dist "${{ matrix.bin_name }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: ${{ matrix.archive_name }}

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
